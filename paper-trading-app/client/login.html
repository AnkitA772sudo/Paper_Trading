<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrade — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a0e1a 0%, #0d1b3e 50%, #0a1628 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #d4af37;
    }
    .auth-container { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 420px; padding: 1rem; }
    .card {
      background: rgba(10, 20, 50, 0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,175,55,0.1);
    }
    h1 { text-align: center; font-size: 1.9rem; margin-bottom: 0.25rem; color: #d4af37; letter-spacing: 1px; }
    .subtitle { text-align: center; font-size: 0.85rem; color: rgba(212,175,55,0.5); margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin-bottom: 1rem; color: rgba(212,175,55,0.8); text-transform: uppercase; letter-spacing: 1px; }
    label { display: block; font-size: 0.78rem; color: rgba(212,175,55,0.6); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%; padding: 0.7rem 0.9rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 8px; color: #f0e6c0; font-size: 0.95rem;
      margin-bottom: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: rgba(212,175,55,0.7); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
    button[type="submit"] {
      width: 100%; padding: 0.75rem;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      border: none; border-radius: 8px; color: #0a0e1a;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      min-height: 44px; transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    button[type="submit"]:hover { opacity: 0.9; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    #notifications { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; }
    .notification { padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.9rem; color: #fff; }
    .notification--error { background: rgba(180,30,30,0.9); border: 1px solid rgba(255,80,80,0.3); }
    .notification--success { background: rgba(20,120,60,0.9); border: 1px solid rgba(80,200,120,0.3); }
    @media (max-width: 480px) { .card { padding: 1.5rem; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <h1>📈 PaperTrade</h1>
      <p class="subtitle">Simulate trading with virtual money</p>
      <h2>Login</h2>
      <form id="login-form">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" autocomplete="username" required />
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />
        <button type="submit">Log In</button>
      </form>
    </div>
    <div class="card">
      <h2>Create Account</h2>
      <form id="signup-form">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" name="username" autocomplete="username" required />
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" autocomplete="new-password" required />
        <label for="signup-confirm-password">Confirm Password</label>
        <input type="password" id="signup-confirm-password" name="confirm-password" autocomplete="new-password" required />
        <button type="submit">Sign Up</button>
      </form>
    </div>
  </div>
  <div id="notifications"></div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
