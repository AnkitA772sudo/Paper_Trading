<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperTrade — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050d1a;
      background-image:
        linear-gradient(135deg, transparent 40%, rgba(0,80,200,0.05) 40%, rgba(0,80,200,0.05) 60%, transparent 60%),
        linear-gradient(135deg, transparent 20%, rgba(0,140,255,0.03) 20%, rgba(0,140,255,0.03) 40%, transparent 40%);
      background-size: 300px 300px, 200px 200px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2eaf5;
    }
    .auth-container { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 420px; padding: 1rem; }
    .card {
      background: rgba(7,18,36,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0,140,255,0.2);
      border-radius: 14px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(0,200,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #0088ff, #00c8ff, transparent);
    }
    .card::after {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(0,136,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    h1 {
      text-align: center;
      font-size: 1.9rem;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #fff 0%, #00c8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
    }
    .subtitle { text-align: center; font-size: .85rem; color: rgba(160,190,230,0.5); margin-bottom: 1.5rem; }
    h2 { font-size: .9rem; margin-bottom: 1rem; color: rgba(0,200,255,0.8); text-transform: uppercase; letter-spacing: 1px; }
    label { display: block; font-size: .75rem; color: rgba(160,190,230,0.55); margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .5px; }
    input {
      width: 100%; padding: .7rem .9rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,140,255,0.2);
      border-radius: 8px; color: #e2eaf5; font-size: .95rem;
      margin-bottom: 1rem; outline: none; transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    input:focus { border-color: rgba(0,180,255,0.6); box-shadow: 0 0 0 3px rgba(0,136,255,0.12); }
    button[type="submit"] {
      width: 100%; padding: .75rem;
      background: linear-gradient(135deg, #0088ff, #0055cc);
      border: none; border-radius: 10px; color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      min-height: 44px; transition: all .2s;
      box-shadow: 0 4px 15px rgba(0,136,255,0.35);
      font-family: inherit;
    }
    button[type="submit"]:hover {
      background: linear-gradient(135deg, #00c8ff, #0088ff);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,136,255,0.45);
    }
    #notifications { position: fixed; top: 1rem; right: 1rem; z-index: 1000; display: flex; flex-direction: column; gap: .5rem; }
    .notification { padding: .75rem 1.25rem; border-radius: 10px; font-size: .9rem; color: #fff; }
    .notification--error { background: rgba(200,30,60,0.9); border: 1px solid rgba(255,77,109,0.3); }
    .notification--success { background: rgba(0,180,80,0.9); border: 1px solid rgba(0,230,118,0.3); }
    @media (max-width: 480px) { .card { padding: 1.5rem; } }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <h1>📈 PaperTrade</h1>
      <p class="subtitle">Simulate trading with virtual money</p>
      <h2>Login</h2>
      <form id="login-form">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" autocomplete="username" required placeholder="Enter username" />
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Enter password" />
        <button type="submit">Log In →</button>
      </form>
    </div>
    <div class="card">
      <h2>Create Account</h2>
      <form id="signup-form">
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" name="username" autocomplete="username" required placeholder="Choose a username" />
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" autocomplete="new-password" required placeholder="Min 6 characters" />
        <label for="signup-confirm-password">Confirm Password</label>
        <input type="password" id="signup-confirm-password" name="confirm-password" autocomplete="new-password" required placeholder="Repeat password" />
        <button type="submit">Sign Up →</button>
      </form>
    </div>
  </div>
  <div id="notifications"></div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
